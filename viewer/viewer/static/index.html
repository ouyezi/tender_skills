<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doc-chunk viewer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-row">
      <nav class="nav-tabs">
        <a href="/" class="active">切片预览</a>
        <a href="/interpret">招标解读</a>
      </nav>
      <label class="upload-label">
        <span>上传</span>
        <input type="file" id="upload-input" accept=".docx,.pdf">
      </label>
      <div class="open-workspace">
        <input type="text" id="open-path" placeholder="工作区路径">
        <button type="button" id="open-btn">打开</button>
      </div>
      <select id="session-select" aria-label="会话">
        <option value="">— 无会话 —</option>
      </select>
      <button type="button" id="delete-session-btn" title="删除当前会话及工作区文件">删除会话</button>
      <button type="button" id="reextract-btn" title="删除工作区并重新跑流水线">重新提取</button>
    </div>
    <div id="progress-bar" class="progress-bar" hidden></div>
  </header>

  <div class="main-layout">
    <aside class="outline-aside">
      <div id="outline-meta" class="meta-bar"></div>
      <div id="outline-tree" class="outline-tree"></div>
      <div class="assets-panel">
        <div class="assets-panel-header">文档资产</div>
        <div id="assets-list" class="assets-list muted">—</div>
      </div>
    </aside>
    <main class="content-main">
      <div id="section-meta" class="meta-bar section-meta-bar" hidden>
        <span id="section-meta-text"></span>
        <button type="button" id="copy-markdown-btn" title="复制 Markdown 原文">复制</button>
      </div>
      <div id="content-panel" class="content-panel"></div>
    </main>
  </div>

  <div id="image-preview-modal" class="asset-modal" hidden>
    <div class="asset-modal-backdrop" id="image-preview-backdrop"></div>
    <div class="asset-modal-body">
      <header class="asset-modal-header">
        <code id="image-preview-ref"></code>
        <button type="button" id="close-image-preview">关闭</button>
      </header>
      <img id="image-preview-img" alt="">
    </div>
  </div>

  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
