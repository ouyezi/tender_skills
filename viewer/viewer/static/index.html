<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doc-chunk viewer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-row">
      <label class="upload-label">
        <span>上传</span>
        <input type="file" id="upload-input" accept=".docx,.pdf">
      </label>
      <div class="open-workspace">
        <input type="text" id="open-path" placeholder="工作区路径">
        <button type="button" id="open-btn">打开</button>
      </div>
      <select id="session-select" aria-label="会话">
        <option value="">— 无会话 —</option>
      </select>
    </div>
    <div id="progress-bar" class="progress-bar" hidden></div>
  </header>

  <div class="main-layout">
    <aside class="outline-aside">
      <div id="outline-meta" class="meta-bar"></div>
      <div id="outline-tree" class="outline-tree"></div>
    </aside>
    <main class="content-main">
      <div id="section-meta" class="meta-bar"></div>
      <div id="content-panel" class="content-panel"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
