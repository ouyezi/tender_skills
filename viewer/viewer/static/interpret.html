<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>招标解读</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="interpret-page">
  <header class="top-bar">
    <div class="top-bar-row">
      <nav class="nav-tabs">
        <a href="/">切片预览</a>
        <a href="/interpret" class="active">招标解读</a>
      </nav>
      <label class="upload-label">
        <span>文件 1</span>
        <input type="file" id="file1-input" accept=".docx,.pdf">
      </label>
      <label class="upload-label">
        <span>补充文件（可选）</span>
        <input type="file" id="file2-input" accept=".docx,.pdf">
      </label>
      <button type="button" id="start-btn">开始解读</button>
      <select id="interpret-session-select" aria-label="解读会话">
        <option value="">— 无会话 —</option>
      </select>
      <button type="button" id="delete-interpret-session-btn" title="删除当前会话及工作区文件">删除会话</button>
    </div>
    <div id="interpret-progress" class="progress-panel" hidden>
      <div class="progress-meta">
        <span id="interpret-progress-label">准备中…</span>
        <span id="interpret-progress-percent">0%</span>
      </div>
      <div class="progress-track"><div id="interpret-progress-fill" class="progress-fill"></div></div>
      <div id="interpret-progress-detail" class="progress-detail"></div>
      <div id="interpret-progress-steps" class="progress-steps"></div>
    </div>
    <div id="interpret-error" class="progress-bar" hidden></div>
  </header>

  <main class="interpret-main">
    <section id="result-panel" class="result-panel" hidden>
      <section id="overview-panel" class="overview-panel" hidden>
        <details open>
          <summary>解读概要</summary>
          <div id="overview-content"></div>
        </details>
      </section>
      <div class="tab-bar" id="result-tabs"></div>
      <div id="result-cards" class="card-list"></div>
    </section>
  </main>

  <aside id="source-panel" class="source-panel" hidden>
    <div class="source-panel-header">
      <strong>原文</strong>
      <button type="button" id="close-source-panel">关闭</button>
    </div>
    <div id="source-content" class="content-panel"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/static/interpret.js?v=20260624d"></script>
</body>
</html>
