<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>目录生成</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="gen-catalog-page">
  <header class="top-bar">
    <div class="top-bar-row">
      <nav class="nav-tabs">
        <a href="/">切片预览</a>
        <a href="/interpret">招标解读</a>
        <a href="/gen-catalog" class="active">目录生成</a>
      </nav>
      <label>
        模式
        <select id="mode-select" aria-label="生成模式">
          <option value="step" selected>按步</option>
          <option value="auto">一次性</option>
        </select>
      </label>
      <button type="button" id="start-btn">生成目录</button>
      <button type="button" id="continue-btn">继续</button>
      <button type="button" id="accept-btn">确认落盘</button>
      <button type="button" id="restart-btn">从头重来</button>
      <select id="gen-catalog-session-select" aria-label="解读会话">
        <option value="">— 选择会话 —</option>
      </select>
      <span id="session-label" class="muted"></span>
    </div>
    <div id="prerequisite-warnings" class="progress-bar" hidden></div>
    <div id="gen-catalog-progress" class="progress-panel" hidden>
      <div class="progress-meta">
        <span id="gen-catalog-progress-label">准备中…</span>
        <span id="gen-catalog-progress-percent">0%</span>
      </div>
      <div class="progress-track"><div id="gen-catalog-progress-fill" class="progress-fill"></div></div>
      <div id="gen-catalog-progress-detail" class="progress-detail"></div>
    </div>
    <div id="gen-catalog-error" class="progress-bar" hidden></div>
  </header>

  <main class="gen-catalog-main">
    <section class="gen-catalog-layout">
      <aside id="outline-tree" class="outline-tree-panel"></aside>
      <section id="node-detail" class="node-detail-panel">
        <p class="muted">选择左侧节点查看详情</p>
      </section>
    </section>
    <details id="llm-calls-panel" class="llm-calls-panel">
      <summary>LLM 调用记录</summary>
      <div id="llm-calls-list" class="card-list llm-calls-list"></div>
    </details>
  </main>

  <script src="/static/llm-calls-ui.js?v=20260626a"></script>
  <script src="/static/llm-call-card.js?v=20260626a"></script>
  <script src="/static/gen-catalog.js?v=20260626a"></script>
</body>
</html>
